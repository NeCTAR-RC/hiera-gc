[tox]
requires =
    tox>=4
envlist = py310, py312, pep8
skip_missing_interpreters = true

[testenv]
deps =
    pytest
    PyYAML
commands = pytest {posargs}

[testenv:pep8]
description = Run style checks.
skip_install = true
deps = pre-commit
commands = pre-commit run --all-files --show-diff-on-failure

[flake8]
show-source = True
# Only run hacking (H) checks; pycodestyle E/W codes are handled by ruff and
# ruff-format so they do not need to be duplicated here.
select = H,O
# H301 multiple imports per line are fine
# H403 multi line docstrings may end on the closing quotes
# H404 docstrings need not start with a newline
# H405 multi line docstring summaries need not be separated by a blank line
ignore = H301,H403,H404,H405
import-order-style = pep8
application-import-names = hiera_gc
